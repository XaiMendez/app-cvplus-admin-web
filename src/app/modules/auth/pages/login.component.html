<div class="login-page">
  <div class="login-content">
    <!-- Logo & Header -->
    <div class="login-header">
      <div class="logo">
        <svg width="64" height="64" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="56" height="56" rx="12" fill="url(#gradient)"/>
          <path d="M37.56 15.9997H29.3499V25.117C29.3499 30.1618 25.4802 34.4999 20.7402 34.4999H19.6522V22.64C19.6522 20.3424 20.4833 18.2625 21.8122 16.6054C23.1077 15.0181 24.7762 13.9589 26.6145 13.5526V11H38.4275C37.1923 12.7404 36.4217 14.8386 36.4217 17.1339V15.9997H37.56Z" fill="white"/>
          <defs>
            <linearGradient id="gradient" x1="0" y1="0" x2="56" y2="56">
              <stop offset="0%" stop-color="#3b82f6"/>
              <stop offset="100%" stop-color="#1d4ed8"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>CV+ Admin</h1>
      <p>Ingresa a tu cuenta para continuar</p>
    </div>

    <!-- Card -->
    <div class="login-card">
      <form (ngSubmit)="onSignIn()">
        <!-- Email -->
        <div class="form-group">
          <label for="email">Email</label>
          <input
            pInputText
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="tu@email.com"
            class="w-full"
          />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Contraseña</label>
          <p-password
            id="password"
            [(ngModel)]="password"
            name="password"
            [feedback]="false"
            [toggleMask]="true"
            placeholder="••••••••"
          ></p-password>
        </div>

        <!-- Remember & Forgot -->
        <div class="form-actions">
          <div class="flex align-items-center">
            <p-checkbox
              [(ngModel)]="checked"
              name="checked"
              [binary]="true"
              inputId="remember"
            ></p-checkbox>
            <label for="remember" class="ml-2 text-sm">Recuérdame</label>
          </div>
          <a href="#" class="text-sm">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- Sign In Button -->
        <p-button
          type="submit"
          label="Iniciar Sesión"
          class="w-full"
          [loading]="false"
        ></p-button>
      </form>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <p>¿No tienes cuenta? <a href="#">Crear una nueva</a></p>
    </div>
  </div>
</div>
